name: tw.transcript.block.name
icon: audio

fields:
  headline:
    type: text
    label: tw.transcript.block.field.headline
    default: Transkript
  intro:
    type: textarea
    label: tw.transcript.block.field.intro
  repeatSpeakerPerSegment:
    type: toggle
    label: tw.transcript.block.field.repeatSpeaker
    default: false
    width: 1/2
  initialState:
    type: toggle
    label: tw.transcript.block.field.initialState
    default: false
    text:
      - tw.transcript.block.field.initialState.closed
      - tw.transcript.block.field.initialState.open
    width: 1/2
  segments:
    type: structure
    label: tw.transcript.block.field.segments
    fields:
      speaker:
        type: text
        label: tw.transcript.block.field.speaker
      timestamp:
        type: text
        label: tw.transcript.block.field.timestamp
      text:
        type: textarea
        label: tw.transcript.block.field.text
